<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RAG System Frontend</title>
    <style>
        body { font-family: Arial, sans-serif; margin: 20px; }
        .container { max-width: 800px; margin: 0 auto; }
        .section { margin-bottom: 30px; padding: 20px; border: 1px solid #ddd; border-radius: 5px; }
        input, button { padding: 10px; margin: 5px; }
        #chat-messages { height: 300px; overflow-y: auto; border: 1px solid #ccc; padding: 10px; }
        .message { margin-bottom: 10px; }
        .user { color: blue; }
        .bot { color: green; }
    </style>
</head>
<body>
    <div class="container">
        <h1>RAG System</h1>

        <div class="section">
            <h2>Upload Document</h2>
            <input type="file" id="file-input" accept=".pdf,.txt,.md">
            <input type="text" id="user-id" placeholder="User ID (optional)">
            <button onclick="uploadDocument()">Upload</button>
            <div id="upload-status"></div>
        </div>

        <div class="section">
            <h2>List Documents</h2>
            <input type="text" id="list-user-id" placeholder="User ID">
            <button onclick="listDocuments()">List</button>
            <div id="documents-list"></div>
        </div>

        <div class="section">
            <h2>Chat</h2>
            <input type="text" id="chat-user-id" placeholder="User ID">
            <input type="text" id="session-id" placeholder="Session ID">
            <div id="chat-messages"></div>
            <input type="text" id="chat-input" placeholder="Ask a question...">
            <button onclick="sendMessage()">Send</button>
            <button onclick="clearHistory()">Clear History</button>
        </div>
    </div>

    <script>
        const API_BASE = 'http://localhost:8000';

        async function uploadDocument() {
            const fileInput = document.getElementById('file-input');
            const userId = document.getElementById('user-id').value;
            const status = document.getElementById('upload-status');

            if (!fileInput.files[0]) {
                status.textContent = 'Please select a file';
                return;
            }

            const formData = new FormData();
            formData.append('file', fileInput.files[0]);
            if (userId) formData.append('user_id', userId);

            try {
                const response = await fetch(`${API_BASE}/upload/document/`, {
                    method: 'POST',
                    body: formData
                });
                const result = await response.json();
                status.textContent = JSON.stringify(result, null, 2);
            } catch (error) {
                status.textContent = 'Error: ' + error.message;
            }
        }

        async function listDocuments() {
            const userId = document.getElementById('list-user-id').value;
            const list = document.getElementById('documents-list');

            if (!userId) {
                list.textContent = 'Please enter User ID';
                return;
            }

            try {
                const response = await fetch(`${API_BASE}/upload/documents/?user_id=${userId}`);
                const result = await response.json();
                list.textContent = JSON.stringify(result, null, 2);
            } catch (error) {
                list.textContent = 'Error: ' + error.message;
            }
        }

        async function sendMessage() {
            const userId = document.getElementById('chat-user-id').value;
            const sessionId = document.getElementById('session-id').value;
            const query = document.getElementById('chat-input').value;
            const messages = document.getElementById('chat-messages');

            if (!userId || !sessionId || !query) {
                alert('Please fill all chat fields');
                return;
            }

            // Add user message
            const userDiv = document.createElement('div');
            userDiv.className = 'message user';
            userDiv.textContent = 'You: ' + query;
            messages.appendChild(userDiv);

            try {
                const response = await fetch(`${API_BASE}/chat/`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({
                        query: query,
                        user_id: userId,
                        session_id: sessionId,
                        k: 3
                    })
                });
                const result = await response.json();

                // Add bot response
                const botDiv = document.createElement('div');
                botDiv.className = 'message bot';
                botDiv.innerHTML = `Bot: ${result.answer}<br>Sources: ${result.sources.join(', ')}`;
                messages.appendChild(botDiv);

                messages.scrollTop = messages.scrollHeight;
            } catch (error) {
                const errorDiv = document.createElement('div');
                errorDiv.className = 'message bot';
                errorDiv.textContent = 'Error: ' + error.message;
                messages.appendChild(errorDiv);
            }

            document.getElementById('chat-input').value = '';
        }

        async function clearHistory() {
            const sessionId = document.getElementById('session-id').value;

            if (!sessionId) {
                alert('Please enter Session ID');
                return;
            }

            try {
                await fetch(`${API_BASE}/chat/${sessionId}`, { method: 'DELETE' });
                document.getElementById('chat-messages').innerHTML = '';
                alert('History cleared');
            } catch (error) {
                alert('Error: ' + error.message);
            }
        }
    </script>
</body>
</html>
